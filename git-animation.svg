<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 120" width="100%" height="120">
  <style>
    .bg { fill: none; }
    .branch-main {
      stroke: #58a6ff;
      stroke-width: 4;
      stroke-linecap: round;
      fill: none;
      stroke-dasharray: 600;
      stroke-dashoffset: 600;
      animation: drawMain 8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }
    .branch-feature {
      stroke: #bc8cff;
      stroke-width: 3;
      stroke-linecap: round;
      stroke-dasharray: 400;
      stroke-dashoffset: 400;
      fill: none;
      animation: drawFeature 8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }
    .commit {
      fill: #0d1117;
      stroke-width: 4;
      transform-origin: center;
      transform: scale(0);
      animation-duration: 8s;
      animation-iteration-count: infinite;
      animation-timing-function: cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .commit-main-1 {
      stroke: #58a6ff;
      animation-name: commitMain1;
    }
    .commit-feat-1 {
      stroke: #bc8cff;
      animation-name: commitFeat1;
    }
    .commit-feat-2 {
      stroke: #bc8cff;
      animation-name: commitFeat2;
    }
    .commit-merge {
      stroke: #58a6ff;
      animation-name: commitMerge;
    }
    .text-label {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 11px;
      font-weight: 600;
      fill: #8b949e;
      opacity: 0;
      animation: fadeInText 8s ease infinite;
    }
    .text-label.main-label {
      animation-name: fadeInMainLabel;
    }
    .text-label.feat-label {
      animation-name: fadeInFeatLabel;
    }

    @keyframes drawMain {
      0% { stroke-dashoffset: 600; }
      15% { stroke-dashoffset: 480; } /* draws past commit 1 to branch point */
      55% { stroke-dashoffset: 480; } /* pauses while feature branch goes */
      70% { stroke-dashoffset: 0; }   /* draws the rest after merge */
      100% { stroke-dashoffset: 0; }
    }

    @keyframes drawFeature {
      0% { stroke-dashoffset: 400; }
      15% { stroke-dashoffset: 400; } /* starts drawing */
      50% { stroke-dashoffset: 0; }   /* finishes merging back */
      100% { stroke-dashoffset: 0; }
    }

    @keyframes commitMain1 {
      0%, 8% { transform: scale(0); }
      12%, 90% { transform: scale(1); }
      95%, 100% { transform: scale(0); }
    }

    @keyframes commitFeat1 {
      0%, 23% { transform: scale(0); }
      27%, 90% { transform: scale(1); }
      95%, 100% { transform: scale(0); }
    }

    @keyframes commitFeat2 {
      0%, 36% { transform: scale(0); }
      40%, 90% { transform: scale(1); }
      95%, 100% { transform: scale(0); }
    }

    @keyframes commitMerge {
      0%, 60% { transform: scale(0); }
      65%, 90% { transform: scale(1); }
      95%, 100% { transform: scale(0); }
    }

    @keyframes fadeInMainLabel {
      0%, 5% { opacity: 0; }
      10%, 90% { opacity: 1; }
      95%, 100% { opacity: 0; }
    }

    @keyframes fadeInFeatLabel {
      0%, 18% { opacity: 0; }
      23%, 90% { opacity: 1; }
      95%, 100% { opacity: 0; }
    }
  </style>

  <rect class="bg" width="100%" height="100%" />

  <!-- Grid/decoration lines for tech theme -->
  <line x1="0" y1="20" x2="600" y2="20" stroke="#161b22" stroke-width="1" stroke-dasharray="5 5" />
  <line x1="0" y1="100" x2="600" y2="100" stroke="#161b22" stroke-width="1" stroke-dasharray="5 5" />

  <!-- Branches -->
  <!-- main branch: straight line at y=70 -->
  <path class="branch-main" d="M 50 70 L 550 70" />
  
  <!-- feature branch: curves up to y=35, then back down to merge -->
  <path class="branch-feature" d="M 150 70 C 180 70, 200 35, 230 35 L 340 35 C 370 35, 390 70, 420 70" />

  <!-- Commit Nodes -->
  <!-- Initial Commit -->
  <circle class="commit commit-main-1" cx="100" cy="70" r="6" />
  
  <!-- Feature Commits -->
  <circle class="commit commit-feat-1" cx="250" cy="35" r="5" />
  <circle class="commit commit-feat-2" cx="320" cy="35" r="5" />
  
  <!-- Merge Commit -->
  <circle class="commit commit-merge" cx="460" cy="70" r="6" />

  <!-- Labels -->
  <text class="text-label main-label" x="50" y="92">main</text>
  <text class="text-label feat-label" x="180" y="25">feature/dev</text>
  
  <!-- Subtle git push command visual -->
  <text class="text-label" x="430" y="92" style="animation-name: fadeInFeatLabel; font-family: monospace; font-size: 10px;">$ git merge --no-ff</text>
</svg>
